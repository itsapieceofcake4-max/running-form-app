<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="90" fill="#0d0d1f"/>
  <!-- Head -->
  <circle cx="265" cy="105" r="42" fill="none" stroke="#00e5ff" stroke-width="22"/>
  <!-- Trunk (leaning forward) -->
  <line x1="255" y1="147" x2="225" y2="285" stroke="#00e5ff" stroke-width="22" stroke-linecap="round"/>
  <!-- Front arm (pumping back) -->
  <line x1="245" y1="195" x2="195" y2="255" stroke="#00e5ff" stroke-width="18" stroke-linecap="round"/>
  <line x1="195" y1="255" x2="215" y2="305" stroke="#00e5ff" stroke-width="15" stroke-linecap="round"/>
  <!-- Back arm (forward) -->
  <line x1="245" y1="195" x2="315" y2="175" stroke="#00e5ff" stroke-width="18" stroke-linecap="round"/>
  <line x1="315" y1="175" x2="340" y2="215" stroke="#00e5ff" stroke-width="15" stroke-linecap="round"/>
  <!-- Back leg (extended behind) -->
  <line x1="225" y1="285" x2="170" y2="370" stroke="#00e5ff" stroke-width="22" stroke-linecap="round"/>
  <line x1="170" y1="370" x2="140" y2="440" stroke="#00e5ff" stroke-width="18" stroke-linecap="round"/>
  <!-- Front leg (raised knee) -->
  <line x1="225" y1="285" x2="300" y2="320" stroke="#ff4081" stroke-width="22" stroke-linecap="round"/>
  <line x1="300" y1="320" x2="355" y2="270" stroke="#ff4081" stroke-width="18" stroke-linecap="round"/>
  <!-- Ground line -->
  <line x1="60" y1="450" x2="452" y2="450" stroke="#1a1a4a" stroke-width="8" stroke-linecap="round"/>
</svg>
